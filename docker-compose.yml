services:
  # ============================================================
  # HDFS - Hadoop Distributed File System
  # ============================================================
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"   # HDFS Web UI
      - "9000:9000"   # HDFS RPC
    environment:
      - CLUSTER_NAME=weather-cluster
    env_file:
      - ./hadoop/hadoop.env
    volumes:
      - namenode_data:/hadoop/dfs/name
    networks:
      - bigdata-net

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    depends_on:
      - namenode
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file:
      - ./hadoop/hadoop.env
    volumes:
      - datanode_data:/hadoop/dfs/data
    networks:
      - bigdata-net

  # ============================================================
  # Apache Hive - Data Warehouse
  # ============================================================
  hive-metastore-db:
    image: postgres:13
    container_name: hive-metastore-db
    hostname: hive-metastore-db
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive_password
    volumes:
      - hive_metastore_db:/var/lib/postgresql/data
    networks:
      - bigdata-net

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-metastore
    hostname: hive-metastore
    depends_on:
      - namenode
      - datanode
      - hive-metastore-db
    environment:
      SERVICE_PRECONDITION: "namenode:9870 datanode:9864 hive-metastore-db:5432"
    env_file:
      - ./hadoop/hadoop.env
    command: /opt/hive/bin/hive --service metastore
    ports:
      - "9083:9083"
    networks:
      - bigdata-net

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-server
    hostname: hive-server
    depends_on:
      - hive-metastore
    environment:
      SERVICE_PRECONDITION: "hive-metastore:9083"
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://hive-metastore-db/metastore"
    env_file:
      - ./hadoop/hadoop.env
    ports:
      - "10000:10000"  # HiveServer2
      - "10002:10002"  # Hive Web UI
    networks:
      - bigdata-net

  # ============================================================
  # Apache Kafka - Message Broker for Streaming
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - bigdata-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    hostname: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - bigdata-net

  # ============================================================
  # Apache Spark - Processing Engine (Batch + Streaming)
  # ============================================================
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    hostname: spark-master
    user: root
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8080"
    ports:
      - "8080:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master RPC
    volumes:
      - ./spark:/opt/spark-jobs
      - ./data:/opt/data
      - ./kafka:/opt/kafka-scripts
    networks:
      - bigdata-net

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    hostname: spark-worker
    user: root
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_WEBUI_PORT: "8081"
    ports:
      - "8081:8081"
    volumes:
      - ./spark:/opt/spark-jobs
      - ./data:/opt/data
    networks:
      - bigdata-net

networks:
  bigdata-net:
    driver: bridge

volumes:
  namenode_data:
  datanode_data:
  hive_metastore_db:
